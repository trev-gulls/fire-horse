<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1a0000" />
  <title>🧧 新年快乐 · Happy Lunar New Year</title>

  <!-- Open Graph / link preview -->
  <!-- IMPORTANT: og:image and og:url must be updated to absolute URLs before sharing a hosted link.
       OG meta tags have no effect when sharing as a file attachment — they only work when hosted. -->
  <meta property="og:title" content="新年快乐 · Happy Lunar New Year" />
  <meta property="og:description" content="新年快乐 · Happy Lunar New Year — Tap to open your red envelope!" />
  <meta property="og:image" content="https://trev-gulls.github.io/fire-horse/preview.png" />
  <meta property="og:url" content="https://trev-gulls.github.io/fire-horse/" />
  <meta property="og:type" content="website" />

  <style>
    /* ── Step 1: Base reset and scene ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #3d0000 0%, #1a0000 70%);
      font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    /* ── Step 2: Envelope container ── */
    .envelope {
      position: relative;
      width: min(300px, 82vw);
      height: min(450px, 78vh);
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
      perspective: 800px;
    }

    .envelope-back,
    .envelope-front,
    .envelope-flap {
      position: absolute;
      left: 0;
      width: 100%;
    }

    /* ── Step 3: Envelope back (full card, always behind) ── */
    .envelope-back {
      top: 0;
      height: 100%;
      background: linear-gradient(160deg, #BB0000 0%, #8B0000 100%);
      border-width: 0 2px 2px 2px;
      border-style: solid;
      border-color: #C9A84C;
      box-shadow:
        0 0 0 1px #8B0000,
        0 0 0 4px #C9A84C,
        0 0 0 5px #8B0000,
        0 12px 50px rgba(0,0,0,0.7);
      border-radius: 6px;
      z-index: 1;
    }

    /* ── Step 4: Envelope front (lower panel, covers bottom 72%) ── */
    .envelope-front {
      top: 28%;
      height: 72%;
      position: relative;
      background: linear-gradient(to right, #AA0000 0%, #DD1111 50%, #AA0000 100%);
      border-radius: 0 0 4px 4px;
      clip-path: url(#front-concave);
      z-index: 3;
    }

    /* Fix 8: decorative gold corner marks on envelope body */
    .envelope-front::before {
      content: '✦';
      position: absolute;
      bottom: 18px;
      left: 14px;
      font-size: 1rem;
      color: rgba(255, 215, 0, 0.38);
      pointer-events: none;
    }

    .envelope-front::after {
      content: '✦';
      position: absolute;
      bottom: 18px;
      right: 14px;
      font-size: 1rem;
      color: rgba(255, 215, 0, 0.38);
      pointer-events: none;
    }

    /* ── Step 5: Flap with rounded arch bottom (traditional shape) ── */
    .envelope-flap {
      top: 0;
      height: 35%;
      background: linear-gradient(180deg, #990000 0%, #BB0000 100%);
      /* Rounded arch bottom — traditional envelope flap shape */
      border-radius: 4px 4px 50% 50% / 4px 4px 30px 30px;
      z-index: 4;
      transform-origin: top center;
      transition: transform 2s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        inset 0 2px 3px rgba(0,0,0,0.18),
        0 4px 8px rgba(0,0,0,0.35);
    }

    /* ── Step 6: 福 character on the front body ── */
    .fu-character {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(3.5rem, 16vw, 6rem);
      color: #FFD700;
      text-shadow:
        0 0 20px rgba(255,215,0,0.8),
        0 2px 4px rgba(0,0,0,0.4);
      line-height: 1;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Wax Seal ────────────────────────────────────────────────── */
    /* Fix 1: seal is last child of .envelope, paints above all layers.
       Centered at the flap/front junction (32% of envelope height). */
    .seal {
      position: absolute;
      width: clamp(64px, 18vw, 88px);
      height: clamp(64px, 18vw, 88px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFD700, #C9A84C 60%, #8B6914);
      border: 3px solid #8B6914;
      box-shadow:
        0 0 0 2px #FFD700,
        0 4px 12px rgba(0,0,0,0.5);
      top: 34%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      will-change: box-shadow;
      touch-action: manipulation;
      -webkit-animation: seal-pulse 2.4s ease-in-out infinite;
              animation: seal-pulse 2.4s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.3s ease;
    }

    /* Fix 9: calligraphic font for a more elegant seal character */
    .seal-horse {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      line-height: 1;
      color: #5a3a00;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
      font-family: "Noto Serif TC", "PingFang SC", "Microsoft YaHei", serif;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    /* ── Seal Pulse Animation ────────────────────────────────────── */
    @keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    @-webkit-keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    /* ── Fire Canvas ─────────────────────────────────────────────── */
    #fire-canvas {
      position: absolute;
      pointer-events: none;
      z-index: 50;
    }

    /* ── Open State ──────────────────────────────────────────────── */
    /* negative rotateX with bottom-center origin = top of flap folds backward (away from viewer) */
    .envelope.is-open .envelope-flap {
      transform: rotateX(175deg);
    }

    .envelope.is-open .seal {
      opacity: 0;
      pointer-events: none;
      -webkit-animation: none;
              animation: none;
    }

    /* Shadow from front panel's concave edge onto paper.
       Gradient on paper ::after darkens the lower visible area where the
       front panel covers it, simulating a cast shadow. */
    .envelope.is-open .envelope-paper::after {
      content: '';
      position: absolute;
      left: 0;
      width: 100%;
      bottom: 15%;
      height: 20%;
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(0,0,0,0.05) 35%,
        rgba(0,0,0,0.2) 55%,
        rgba(0,0,0,0.5) 75%,
        rgba(0,0,0,0.85) 100%
      );
      pointer-events: none;
      animation: shadow-settle 1.8s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
      opacity: 0;
    }

    /* ── Paper Card ───────────────────────────────────────────────── */
    .envelope-paper {
      position: absolute;
      top: 18%;
      left: 6%;
      width: 88%;
      height: 74%;
      background: linear-gradient(160deg, #FFF8F0 0%, #FFE4CC 60%, #FFF0DC 100%);
      border-radius: 3px 3px 0 0;
      box-shadow:
        0 -10px 30px rgba(0,0,0,0.5),
        0 4px 12px rgba(0,0,0,0.25),
        inset 0 0 0 1px rgba(180,100,0,0.12);
      z-index: 2;
      pointer-events: none;
    }

    @keyframes card-slide {
      from { transform: translateY(0); }
      to   { transform: translateY(-60%); }
    }

    @keyframes shadow-settle {
      from { bottom: 45%; opacity: 0; }
      to   { bottom: 15%; opacity: 1; }
    }

    .envelope.is-open .envelope-paper {
      animation: card-slide 1.2s cubic-bezier(0.22, 1, 0.36, 1) 1s forwards;
    }

    /* ── Message ─────────────────────────────────────────────────── */
    .message {
      position: absolute;
      top: 14%;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 20px;
      pointer-events: none;
    }

    .message-cn {
      font-size: clamp(1.3rem, 5.5vw, 2rem);
      color: #8B1A1A;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .message-en {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #5C3317;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .message-year {
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #7A4A1E;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <!-- Concave clip-path for envelope front panel mouth -->
  <svg width="0" height="0" aria-hidden="true" style="position:absolute;pointer-events:none;overflow:hidden">
    <defs>
      <clipPath id="front-concave" clipPathUnits="objectBoundingBox">
        <path d="M0,0 C0.3,0.09 0.7,0.09 1,0 L1,1 L0,1 Z"/>
      </clipPath>
    </defs>
  </svg>
  <div class="scene">
    <div class="envelope" id="envelope">
      <!-- Back of envelope (always behind) -->
      <div class="envelope-back"></div>

      <!-- Flap (folds backward to open) -->
      <div class="envelope-flap" id="flap"></div>

      <!-- Front body of envelope (福 lives here, not on the flap) -->
      <div class="envelope-front">
        <div class="fu-character">福</div>
      </div>

      <!-- Paper card (rises from envelope on opening) -->
      <div class="envelope-paper">
        <div class="message" id="message" aria-live="polite" aria-atomic="true">
          <div class="message-cn" id="message-cn">新年快乐<br>万事如意</div>
          <div class="message-en" id="message-en">Wishing you a Happy New Year and may all go well</div>
          <div class="message-year">丙午年 · 2026</div>
        </div>
      </div>

      <!-- Fire canvas: z-index 50 sits above envelope body layers but below seal (100) -->
      <canvas id="fire-canvas" aria-hidden="true"></canvas>
      <!-- Seal is last child so it paints above canvas and all body layers -->
      <div class="seal" id="seal" role="button" tabindex="0" aria-label="Tap to open">
        <span class="seal-horse" aria-hidden="true">馬</span>
      </div>
    </div>
  </div>
  <script>
    // ─── Fire Particle System ───────────────────────────────────────────────────

    const canvas = document.getElementById('fire-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireIntensity = 1; // multiplier: 1 = ambient, 3 = burst on open
    let fireActive = true; // Fix 4: gates particle spawning; false after open burst

    let sealCenter = { x: 0, y: 0 };

    function updateSealCenter() {
      const env = document.querySelector('.envelope');
      const rect = env.getBoundingClientRect();
      // Spawn fixed at 32% down the envelope — fire stays here even as seal moves
      sealCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height * 0.34 };
    }

    // Initialize after DOM is ready (called at end of script setup)
    updateSealCenter();

    function resizeCanvas() {
      const envRect = document.querySelector('.envelope').getBoundingClientRect();
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      // Offset canvas so its (0,0) matches the viewport origin;
      // particle coordinates remain in viewport space.
      canvas.style.left = (-envRect.left) + 'px';
      canvas.style.top  = (-envRect.top)  + 'px';
      canvas.style.width  = window.innerWidth  + 'px';
      canvas.style.height = window.innerHeight + 'px';
      updateSealCenter();
      particles = []; // force immediate respawn at new seal position
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 100);
    });

    class Particle {
      constructor(x, y) {
        this.reset(x, y);
      }

      reset(x, y) {
        this.x = x + (Math.random() - 0.5) * 60;
        this.y = y + Math.random() * 10;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -(Math.random() * 2.5 + 1) * fireIntensity;
        this.life = 1.0;
        this.decay = Math.random() * 0.018 + 0.012;
        this.size = Math.random() * 12 + 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx += (Math.random() - 0.5) * 0.3;
        this.life -= this.decay;
      }

      // Fix 3: radial gradient per particle creates glowing ember with soft edges.
      // No ctx.save/restore needed — composite operation is managed by the draw loop.
      draw() {
        if (this.life <= 0) return;
        const t = 1 - this.life;
        const r = 255;
        const g = Math.floor(t < 0.5 ? t * 2 * 160 : 160 + (t - 0.5) * 2 * 95);
        const b = Math.floor(t > 0.7 ? (t - 0.7) * 3.3 * 255 : 0);
        const size = this.size * this.life;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
        grad.addColorStop(0, `rgba(255,${g},${b},${this.life * 0.9})`);
        grad.addColorStop(1, `rgba(255,${g},0,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Fix 4: only spawn new particles while fire is active
    function spawnParticles() {
      if (!fireActive) return;
      const target = Math.floor(60 * fireIntensity);
      if (particles.length < target) {
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(sealCenter.x, sealCenter.y));
        }
      }
    }

    let animationId = null;

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const sealPos = sealCenter;

      // Fix 4: only respawn dead particles when fire is still active
      particles.forEach(p => {
        if (p.life <= 0 && fireActive) p.reset(sealPos.x, sealPos.y);
      });

      // Fix 4: prune dead particles when fire has ended so the loop can terminate
      if (!fireActive) {
        particles = particles.filter(p => p.life > 0);
      }

      spawnParticles();
      particles.forEach(p => p.update());

      // Fix 3: additive blending — overlapping particles brighten toward white/yellow,
      // naturally simulating how real flames glow at their cores
      ctx.globalCompositeOperation = 'lighter';
      particles.forEach(p => p.draw());
      ctx.globalCompositeOperation = 'source-over';

      // Fix 4: stop RAF once fire is deactivated and all particles have died
      if (!fireActive && particles.length === 0) return;

      animationId = requestAnimationFrame(animate);
    }

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      } else {
        if (!animationId && (fireActive || particles.length > 0)) animate();
      }
    });

    animate();

    // Called by open interaction
    function fireBurst() {
      fireIntensity = 3;
      setTimeout(() => { fireIntensity = 1; }, 1200);
    }

    // ─── URL Parameter Customization ─────────────────────────────────────────────

    (function() {
      const params = new URLSearchParams(window.location.search);
      const cnEl = document.getElementById('message-cn');
      const enEl = document.getElementById('message-en');

      const customCn = (params.get('cn') ?? '').trim();
      const customEn = (params.get('msg') ?? '').trim();

      if (customCn) cnEl.textContent = customCn;
      if (customEn) enEl.textContent = customEn;
    })();

    // ─── Envelope Open Interaction ────────────────────────────────────────────────

    const envelope = document.getElementById('envelope');
    const seal = document.getElementById('seal');
    let isOpen = false;

    function openEnvelope() {
      if (isOpen) return;
      isOpen = true;
      envelope.classList.add('is-open');
      fireBurst();
      // After burst completes, stop spawning and fade canvas out
      setTimeout(() => {
        fireActive = false;
        canvas.style.transition = 'opacity 0.8s ease';
        canvas.style.opacity = '0';
      }, 800);
      // At 1s (flap halfway through rotation), drop flap below paper so card can slide over it
      setTimeout(() => {
        document.querySelector('.envelope-flap').style.zIndex = '1';
      }, 1000);
    }

    // Desktop: click
    seal.addEventListener('click', openEnvelope);

    // Mobile: touchstart (preventDefault stops the 300ms delayed click from also firing)
    seal.addEventListener('touchstart', function(e) {
      e.preventDefault();
      openEnvelope();
    }, { passive: false });

    // Keyboard: Enter and Space for accessibility (seal has role="button" tabindex="0")
    seal.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openEnvelope();
      }
    });
  </script>
</body>
</html>
