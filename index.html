<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新年快乐 · Happy Chinese New Year 🧧</title>

  <!-- Open Graph / link preview -->
  <!-- IMPORTANT: og:image and og:url must be updated to absolute URLs before sharing a hosted link.
       OG meta tags have no effect when sharing as a file attachment — they only work when hosted. -->
  <meta property="og:title" content="新年快乐 · Happy Chinese New Year 🧧" />
  <meta property="og:description" content="🧧 新年快乐 · Happy Chinese New Year — Tap to open your red envelope!" />
  <meta property="og:image" content="preview.png" />
  <meta property="og:url" content="https://your-domain.com/" />
  <meta property="og:type" content="website" />

  <style>
    /* styles go here */
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope" id="envelope">
      <!-- Back of envelope (always behind) -->
      <div class="envelope-back"></div>

      <!-- Flap (folds up to open) -->
      <div class="envelope-flap" id="flap">
        <div class="fu-character">福</div>
      </div>

      <!-- Front body of envelope -->
      <div class="envelope-front">
        <!-- Wax seal (the click target) -->
        <div class="seal" id="seal" role="button" tabindex="0" aria-label="Tap to open">
          <span class="seal-horse" aria-hidden="true">馬</span>
        </div>
      </div>

      <!-- Message (hidden until open) -->
      <div class="message" id="message" aria-live="polite" aria-atomic="true">
        <div class="message-cn" id="message-cn">新年快乐，万事如意</div>
        <div class="message-en" id="message-en">Wishing you a Happy New Year and may all go well</div>
        <div class="message-year">🐎 2026 · 年</div>
      </div>
    </div>
  </div>
  <canvas id="fire-canvas" aria-hidden="true"></canvas>
  <script>
    // scripts go here
  </script>
</body>
</html>
