<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新年快乐 · Happy Chinese New Year 🧧</title>

  <!-- Open Graph / link preview -->
  <!-- IMPORTANT: og:image and og:url must be updated to absolute URLs before sharing a hosted link.
       OG meta tags have no effect when sharing as a file attachment — they only work when hosted. -->
  <meta property="og:title" content="新年快乐 · Happy Chinese New Year 🧧" />
  <meta property="og:description" content="🧧 新年快乐 · Happy Chinese New Year — Tap to open your red envelope!" />
  <meta property="og:image" content="preview.png" />
  <meta property="og:url" content="https://your-domain.com/" />
  <meta property="og:type" content="website" />

  <style>
    /* ── Step 1: Base reset and scene ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #3d0000 0%, #1a0000 70%);
      font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      perspective: 800px;
    }

    /* ── Step 2: Envelope container ── */
    .envelope {
      position: relative;
      width: min(300px, 82vw);
      height: min(450px, 78vh);
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
      transform-style: preserve-3d;
    }

    .envelope-back,
    .envelope-front,
    .envelope-flap {
      position: absolute;
      left: 0;
      width: 100%;
    }

    /* ── Step 3: Envelope back (full card, always behind) ── */
    /* Fix 5: hatch patterns layered on top of gradient so they show through flap arch gap */
    .envelope-back {
      top: 0;
      height: 100%;
      background-color: #8B0000;
      background-image:
        linear-gradient(45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(201,168,76,0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(201,168,76,0.12) 75%),
        linear-gradient(160deg, #CC0000 0%, #8B0000 100%);
      background-size: 16px 16px, 16px 16px, 16px 16px, 16px 16px, 100% 100%;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px, 0 0;
      border: 2px solid #C9A84C;
      box-shadow:
        0 0 0 1px #8B0000,
        0 0 0 4px #C9A84C,
        0 0 0 5px #8B0000,
        0 12px 50px rgba(0,0,0,0.7);
      border-radius: 6px;
      z-index: 1;
    }

    /* ── Step 4: Envelope front (lower panel, covers bottom 68%) ── */
    /* Fix 7: individual borders removed — back's box-shadow provides unified border ring */
    .envelope-front {
      top: 32%;
      height: 68%;
      position: relative;
      background-color: #A00000;
      background-image:
        linear-gradient(45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(201,168,76,0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(201,168,76,0.12) 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      border-radius: 0 0 4px 4px;
      z-index: 2;
    }

    /* Fix 8: decorative gold corner marks on envelope body */
    .envelope-front::before {
      content: '✦';
      position: absolute;
      bottom: 18px;
      left: 14px;
      font-size: 1rem;
      color: rgba(255, 215, 0, 0.38);
      pointer-events: none;
    }

    .envelope-front::after {
      content: '✦';
      position: absolute;
      bottom: 18px;
      right: 14px;
      font-size: 1rem;
      color: rgba(255, 215, 0, 0.38);
      pointer-events: none;
    }

    /* ── Step 5: Flap with rounded arch bottom (traditional shape) ── */
    /* Fix 6: transform-origin → bottom center so flap lifts toward viewer like a lid */
    /* Fix 7: individual borders removed — back's box-shadow provides unified border ring */
    .envelope-flap {
      top: 0;
      height: 35%;
      background: linear-gradient(180deg, #BB0000 0%, #990000 100%);
      /* Rounded arch bottom — traditional envelope flap shape */
      border-radius: 4px 4px 50% 50% / 4px 4px 30px 30px;
      z-index: 3;
      transform-origin: bottom center;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Step 6: 福 character on the flap ── */
    .fu-character {
      font-size: clamp(2.5rem, 10vw, 4rem);
      color: #FFD700;
      text-shadow:
        0 0 20px rgba(255,215,0,0.8),
        0 2px 4px rgba(0,0,0,0.4);
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Step 7: Gold horse decoration on the envelope body ── */
    /* Fix 8: opacity increased to 0.45 for a more visible watermark */
    .envelope-back::after {
      content: '馬';
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(4rem, 20vw, 7rem);
      color: rgba(255, 215, 0, 0.45);
      text-shadow: 0 0 30px rgba(255,215,0,0.15);
      line-height: 1;
      pointer-events: none;
      font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
    }

    /* ── Wax Seal ────────────────────────────────────────────────── */
    /* Fix 1: seal is last child of .envelope, paints above all layers.
       Centered at the flap/front junction (32% of envelope height). */
    .seal {
      position: absolute;
      width: clamp(64px, 18vw, 88px);
      height: clamp(64px, 18vw, 88px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFD700, #C9A84C 60%, #8B6914);
      border: 3px solid #8B6914;
      box-shadow:
        0 0 0 2px #FFD700,
        0 4px 12px rgba(0,0,0,0.5);
      top: 32%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      will-change: box-shadow;
      touch-action: manipulation;
      -webkit-animation: seal-pulse 2.4s ease-in-out infinite;
              animation: seal-pulse 2.4s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
      transition: opacity 0.3s ease;
    }

    /* Fix 9: calligraphic font for a more elegant seal character */
    .seal-horse {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      line-height: 1;
      color: #5a3a00;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
      font-family: "Noto Serif TC", "PingFang SC", "Microsoft YaHei", serif;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    /* ── Seal Pulse Animation ────────────────────────────────────── */
    @keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    @-webkit-keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    /* ── Fire Canvas ─────────────────────────────────────────────── */
    #fire-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* ── Open State ──────────────────────────────────────────────── */
    /* Fix 6: positive rotateX with bottom-center origin = top of flap lifts toward viewer */
    .envelope.is-open .envelope-flap {
      transform: rotateX(170deg);
    }

    .envelope.is-open .seal {
      opacity: 0;
      pointer-events: none;
      -webkit-animation: none;
              animation: none;
    }

    /* ── Message ─────────────────────────────────────────────────── */
    .message {
      position: absolute;
      top: 8%;
      left: 0;
      right: 0;
      text-align: center;
      padding: 0 20px;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.5s ease 0.7s, transform 0.5s ease 0.7s;
      z-index: 2;
      pointer-events: none;
    }

    .envelope.is-open .message {
      opacity: 1;
      transform: translateY(0);
    }

    .message-cn {
      font-size: clamp(1.3rem, 5.5vw, 2rem);
      color: #FFD700;
      text-shadow: 0 0 20px rgba(255,215,0,0.5);
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .message-en {
      font-size: clamp(0.8rem, 3vw, 1rem);
      color: #FFECB3;
      font-style: italic;
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .message-year {
      font-size: clamp(0.75rem, 2.5vw, 0.9rem);
      color: #C9A84C;
      letter-spacing: 0.12em;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope" id="envelope">
      <!-- Back of envelope (always behind) -->
      <div class="envelope-back"></div>

      <!-- Flap (folds up to open) -->
      <div class="envelope-flap" id="flap">
        <div class="fu-character">福</div>
      </div>

      <!-- Front body of envelope -->
      <div class="envelope-front"></div>

      <!-- Message (hidden until open) -->
      <div class="message" id="message" aria-live="polite" aria-atomic="true">
        <div class="message-cn" id="message-cn">新年快乐，万事如意</div>
        <div class="message-en" id="message-en">Wishing you a Happy New Year and may all go well</div>
        <div class="message-year">🐎 2026 · 年</div>
      </div>

      <!-- Fix 1: seal is last child of .envelope — DOM order guarantees it
           paints above all sibling layers regardless of stacking context. -->
      <div class="seal" id="seal" role="button" tabindex="0" aria-label="Tap to open">
        <span class="seal-horse" aria-hidden="true">馬</span>
      </div>
    </div>
  </div>
  <canvas id="fire-canvas" aria-hidden="true"></canvas>
  <script>
    // ─── Fire Particle System ───────────────────────────────────────────────────

    const canvas = document.getElementById('fire-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireIntensity = 1; // multiplier: 1 = ambient, 3 = burst on open
    let fireActive = true; // Fix 4: gates particle spawning; false after open burst

    let sealCenter = { x: 0, y: 0 };

    function updateSealCenter() {
      const seal = document.getElementById('seal');
      const rect = seal.getBoundingClientRect();
      sealCenter = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
    }

    // Initialize after DOM is ready (called at end of script setup)
    updateSealCenter();

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      updateSealCenter();
      particles = []; // force immediate respawn at new seal position
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 100);
    });

    class Particle {
      constructor(x, y) {
        this.reset(x, y);
      }

      reset(x, y) {
        this.x = x + (Math.random() - 0.5) * 60;
        this.y = y + (Math.random() - 0.5) * 20;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -(Math.random() * 2.5 + 1) * fireIntensity;
        this.life = 1.0;
        this.decay = Math.random() * 0.018 + 0.012;
        this.size = Math.random() * 12 + 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx += (Math.random() - 0.5) * 0.3;
        this.life -= this.decay;
      }

      // Fix 3: radial gradient per particle creates glowing ember with soft edges.
      // No ctx.save/restore needed — composite operation is managed by the draw loop.
      draw() {
        if (this.life <= 0) return;
        const t = 1 - this.life;
        const r = 255;
        const g = Math.floor(t < 0.5 ? t * 2 * 160 : 160 + (t - 0.5) * 2 * 95);
        const b = Math.floor(t > 0.7 ? (t - 0.7) * 3.3 * 255 : 0);
        const size = this.size * this.life;
        const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, size);
        grad.addColorStop(0, `rgba(255,${g},${b},${this.life * 0.9})`);
        grad.addColorStop(1, `rgba(255,${g},0,0)`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Fix 4: only spawn new particles while fire is active
    function spawnParticles() {
      if (!fireActive) return;
      const target = Math.floor(60 * fireIntensity);
      if (particles.length < target) {
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(sealCenter.x, sealCenter.y));
        }
      }
    }

    let animationId = null;

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const sealPos = sealCenter;

      // Fix 4: only respawn dead particles when fire is still active
      particles.forEach(p => {
        if (p.life <= 0 && fireActive) p.reset(sealPos.x, sealPos.y);
      });

      // Fix 4: prune dead particles when fire has ended so the loop can terminate
      if (!fireActive) {
        particles = particles.filter(p => p.life > 0);
      }

      spawnParticles();
      particles.forEach(p => p.update());

      // Fix 3: additive blending — overlapping particles brighten toward white/yellow,
      // naturally simulating how real flames glow at their cores
      ctx.globalCompositeOperation = 'lighter';
      particles.forEach(p => p.draw());
      ctx.globalCompositeOperation = 'source-over';

      // Fix 4: stop RAF once fire is deactivated and all particles have died
      if (!fireActive && particles.length === 0) return;

      animationId = requestAnimationFrame(animate);
    }

    document.addEventListener('visibilitychange', function() {
      if (document.hidden) {
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }
      } else {
        if (!animationId && (fireActive || particles.length > 0)) animate();
      }
    });

    animate();

    // Called by open interaction
    function fireBurst() {
      fireIntensity = 3;
      setTimeout(() => { fireIntensity = 1; }, 1200);
    }

    // ─── URL Parameter Customization ─────────────────────────────────────────────

    (function() {
      const params = new URLSearchParams(window.location.search);
      const cnEl = document.getElementById('message-cn');
      const enEl = document.getElementById('message-en');

      const customCn = (params.get('cn') ?? '').trim();
      const customEn = (params.get('msg') ?? '').trim();

      if (customCn) cnEl.textContent = customCn;
      if (customEn) enEl.textContent = customEn;
    })();

    // ─── Envelope Open Interaction ────────────────────────────────────────────────

    const envelope = document.getElementById('envelope');
    const seal = document.getElementById('seal');
    let isOpen = false;

    function openEnvelope() {
      if (isOpen) return;
      isOpen = true;
      envelope.classList.add('is-open');
      fireBurst();
      // Fix 4: after burst completes, stop spawning and fade canvas out
      setTimeout(() => {
        fireActive = false;
        canvas.style.transition = 'opacity 1s ease';
        canvas.style.opacity = '0';
      }, 2000);
    }

    // Desktop: click
    seal.addEventListener('click', openEnvelope);

    // Mobile: touchstart (preventDefault stops the 300ms delayed click from also firing)
    seal.addEventListener('touchstart', function(e) {
      e.preventDefault();
      openEnvelope();
    }, { passive: false });

    // Keyboard: Enter and Space for accessibility (seal has role="button" tabindex="0")
    seal.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        openEnvelope();
      }
    });
  </script>
</body>
</html>
