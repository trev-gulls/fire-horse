<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新年快乐 · Happy Chinese New Year 🧧</title>

  <!-- Open Graph / link preview -->
  <!-- IMPORTANT: og:image and og:url must be updated to absolute URLs before sharing a hosted link.
       OG meta tags have no effect when sharing as a file attachment — they only work when hosted. -->
  <meta property="og:title" content="新年快乐 · Happy Chinese New Year 🧧" />
  <meta property="og:description" content="🧧 新年快乐 · Happy Chinese New Year — Tap to open your red envelope!" />
  <meta property="og:image" content="preview.png" />
  <meta property="og:url" content="https://your-domain.com/" />
  <meta property="og:type" content="website" />

  <style>
    /* ── Step 1: Base reset and scene ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #3d0000 0%, #1a0000 70%);
      font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
      overflow: hidden;
    }

    .scene {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
      perspective: 800px;
    }

    /* ── Step 2: Envelope container ── */
    .envelope {
      position: relative;
      width: min(300px, 82vw);
      height: min(450px, 78vh);
      cursor: default;
      -webkit-user-select: none;
      user-select: none;
    }

    .envelope-back,
    .envelope-front,
    .envelope-flap {
      position: absolute;
      left: 0;
      width: 100%;
    }

    /* ── Step 3: Envelope back (full card, always behind) ── */
    .envelope-back {
      top: 0;
      height: 100%;
      background: linear-gradient(160deg, #CC0000 0%, #8B0000 100%);
      border: 2px solid #C9A84C;
      box-shadow:
        0 0 0 1px #8B0000,
        0 0 0 4px #C9A84C,
        0 0 0 5px #8B0000,
        0 12px 50px rgba(0,0,0,0.7);
      border-radius: 6px;
      z-index: 1;
    }

    /* ── Step 4: Envelope front (lower panel, covers bottom 68%) ── */
    .envelope-front {
      top: 32%;
      height: 68%;
      background-color: #A00000;
      background-image:
        linear-gradient(45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(201,168,76,0.12) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(201,168,76,0.12) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(201,168,76,0.12) 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
      border-left: 2px solid #C9A84C;
      border-right: 2px solid #C9A84C;
      border-bottom: 2px solid #C9A84C;
      border-radius: 0 0 4px 4px;
      z-index: 2;
    }

    /* ── Step 5: Flap with rounded arch bottom (traditional shape) ── */
    .envelope-flap {
      top: 0;
      height: 35%;
      background: linear-gradient(180deg, #BB0000 0%, #990000 100%);
      border-top: 2px solid #C9A84C;
      border-left: 2px solid #C9A84C;
      border-right: 2px solid #C9A84C;
      /* Rounded arch bottom — traditional envelope flap shape */
      border-radius: 4px 4px 50% 50% / 4px 4px 30px 30px;
      z-index: 3;
      transform-origin: top center;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Step 6: 福 character on the flap ── */
    .fu-character {
      font-size: clamp(2.5rem, 10vw, 4rem);
      color: #FFD700;
      text-shadow:
        0 0 20px rgba(255,215,0,0.8),
        0 2px 4px rgba(0,0,0,0.4);
      line-height: 1;
      position: relative;
      z-index: 1;
    }

    /* ── Step 7: Gold horse decoration on the envelope body ── */
    .envelope-back::after {
      content: '馬';
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(4rem, 20vw, 7rem);
      color: rgba(255, 215, 0, 0.28);
      text-shadow: 0 0 30px rgba(255,215,0,0.1);
      line-height: 1;
      pointer-events: none;
      font-family: "PingFang SC", "Microsoft YaHei", "SimSun", serif;
    }

    /* ── Wax Seal ────────────────────────────────────────────────── */
    .seal {
      position: absolute;
      width: clamp(64px, 18vw, 88px);
      height: clamp(64px, 18vw, 88px);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #FFD700, #C9A84C 60%, #8B6914);
      border: 3px solid #8B6914;
      box-shadow:
        0 0 0 2px #FFD700,
        0 4px 12px rgba(0,0,0,0.5);
      top: -44px; /* straddles flap/front junction; revisit if flap height changes */
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      will-change: box-shadow;
      touch-action: manipulation;
      -webkit-animation: seal-pulse 2.4s ease-in-out infinite;
              animation: seal-pulse 2.4s ease-in-out infinite;
      -webkit-tap-highlight-color: transparent;
    }

    .seal-horse {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      line-height: 1;
      color: #5a3a00;
      text-shadow: 0 1px 2px rgba(0,0,0,0.4);
      -webkit-user-select: none;
      user-select: none;
      pointer-events: none;
    }

    /* ── Seal Pulse Animation ────────────────────────────────────── */
    @keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    @-webkit-keyframes seal-pulse {
      0%, 100% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 14px 3px rgba(255,150,0,0.25);
      }
      50% {
        box-shadow:
          0 0 0 2px #FFD700,
          0 4px 12px rgba(0,0,0,0.5),
          0 0 26px 10px rgba(255,150,0,0.5);
      }
    }

    /* ── Fire Canvas ─────────────────────────────────────────────── */
    #fire-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="envelope" id="envelope">
      <!-- Back of envelope (always behind) -->
      <div class="envelope-back"></div>

      <!-- Flap (folds up to open) -->
      <div class="envelope-flap" id="flap">
        <div class="fu-character">福</div>
      </div>

      <!-- Front body of envelope -->
      <div class="envelope-front">
        <!-- Wax seal (the click target) -->
        <div class="seal" id="seal" role="button" tabindex="0" aria-label="Tap to open">
          <span class="seal-horse" aria-hidden="true">馬</span>
        </div>
      </div>

      <!-- Message (hidden until open) -->
      <div class="message" id="message" aria-live="polite" aria-atomic="true">
        <div class="message-cn" id="message-cn">新年快乐，万事如意</div>
        <div class="message-en" id="message-en">Wishing you a Happy New Year and may all go well</div>
        <div class="message-year">🐎 2026 · 年</div>
      </div>
    </div>
  </div>
  <canvas id="fire-canvas" aria-hidden="true"></canvas>
  <script>
    // ─── Fire Particle System ───────────────────────────────────────────────────

    const canvas = document.getElementById('fire-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireIntensity = 1; // multiplier: 1 = ambient, 3 = burst on open

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('orientationchange', () => {
      setTimeout(resizeCanvas, 100);
    });

    class Particle {
      constructor(x, y) {
        this.reset(x, y);
      }

      reset(x, y) {
        this.x = x + (Math.random() - 0.5) * 60;
        this.y = y + (Math.random() - 0.5) * 20;
        this.vx = (Math.random() - 0.5) * 1.2;
        this.vy = -(Math.random() * 2.5 + 1) * fireIntensity;
        this.life = 1.0;
        this.decay = Math.random() * 0.018 + 0.012;
        this.size = Math.random() * 12 + 4;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx += (Math.random() - 0.5) * 0.3;
        this.life -= this.decay;
      }

      draw() {
        if (this.life <= 0) return;
        // Color: orange (new) → yellow → near-white (old)
        const t = 1 - this.life;
        const r = 255;
        const g = Math.floor(t < 0.5 ? t * 2 * 160 : 160 + (t - 0.5) * 2 * 95);
        const b = Math.floor(t > 0.7 ? (t - 0.7) * 3.3 * 255 : 0);
        ctx.save();
        ctx.globalAlpha = this.life * 0.85;
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function getSealCenter() {
      const seal = document.getElementById('seal');
      const rect = seal.getBoundingClientRect();
      return {
        x: rect.left + rect.width / 2,
        y: rect.top + rect.height / 2,
      };
    }

    function spawnParticles() {
      const target = Math.floor(60 * fireIntensity);
      if (particles.length < target) {
        const { x, y } = getSealCenter();
        for (let i = 0; i < 2; i++) {
          particles.push(new Particle(x, y));
        }
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const { x, y } = getSealCenter();

      particles = particles.map(p => {
        if (p.life <= 0) p.reset(x, y);
        return p;
      });

      spawnParticles();
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    animate();

    // Called by open interaction (Task 6)
    function fireBurst() {
      fireIntensity = 3;
      setTimeout(() => { fireIntensity = 1; }, 1200);
    }
  </script>
</body>
</html>
